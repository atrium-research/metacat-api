name: metacat-api

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATASOURCE: mock
      CORS_ORIGINS: http://localhost:5173
      LOG_LEVEL: INFO
    volumes:
      - ./src:/app/src:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 2s
      retries: 10
    develop:
      watch:
        - path: ./src
          action: rebuild